name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      # Windows 特定依赖
      - name: Install Windows dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          echo "Windows build environment ready"

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          # 从 CHANGELOG.md 提取当前 tag 对应版本的更新内容
          VERSION="${GITHUB_REF_NAME#v}"
          # 提取两个 ## 标题之间的内容（当前版本的 changelog）
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="版本 ${VERSION} 更新"
          fi
          # 追加 macOS 安装提示
          BODY="${BODY}

          ### macOS 安装说明
          首次打开可能提示「已损坏，无法打开」，请执行：
          \`\`\`bash
          sudo xattr -rd com.apple.quarantine /Applications/Work\\ Review.app
          \`\`\`"
          # 写入多行输出
          echo "RELEASE_BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Work Review ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
